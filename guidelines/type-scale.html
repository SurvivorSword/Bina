<!-- @dsCard group="Type" viewport="700x260" name="Type scale" subtitle="Display leans large & airy; body stays grounded" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .r{display:flex;align-items:baseline;gap:16px;border-bottom:1px solid var(--border-strong);padding:7px 0;}
  .r:last-child{border:0;}
  .tag{font:var(--type-mono-eyebrow);color:var(--text-muted);width:64px;flex:none;}
  .ex{font-family:var(--font-display);color:var(--text-display);font-weight:500;line-height:1;white-space:nowrap;}
</style></head>
<body>
  <div class="r"><div class="tag">6xl</div><div class="ex" style="font-size:52px">Bina</div></div>
  <div class="r"><div class="tag">4xl</div><div class="ex" style="font-size:32px">Living timeline</div></div>
  <div class="r"><div class="tag">2xl</div><div class="ex" style="font-family:var(--font-body);font-weight:700;font-size:22px">Section heading</div></div>
  <div class="r"><div class="tag">md</div><div class="ex" style="font-family:var(--font-body);font-weight:400;font-size:15px;color:var(--text-secondary)">Base body copy at fifteen pixels</div></div>
  <div class="r"><div class="tag">xs</div><div class="ex" style="font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:var(--text-muted)">MONO MICRO-LABEL</div></div>
</body></html>
