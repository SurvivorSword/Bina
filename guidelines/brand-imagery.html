<!-- @dsCard group="Brand" viewport="700x260" name="Imagery treatment" subtitle="Cool, moonlit, luminous; protect with bottom gradient" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:0;background:var(--bg);}
  .hero{position:relative;height:260px;overflow:hidden;}
  .hero img{width:100%;height:100%;object-fit:cover;object-position:50% 30%;filter:saturate(108%) brightness(.96);}
  .protect{position:absolute;inset:0;background:linear-gradient(0deg,var(--night-950) 2%,transparent 55%),linear-gradient(90deg,color-mix(in oklch,var(--night-950) 70%,transparent),transparent 50%);}
  .cap{position:absolute;left:26px;bottom:22px;}
  .eb{font:var(--type-mono-eyebrow);letter-spacing:.12em;text-transform:uppercase;color:var(--glow-300);}
  .h{font-family:var(--font-display);font-weight:500;font-size:40px;color:var(--moon);margin-top:4px;text-shadow:var(--glow-text);}
</style></head>
<body>
  <div class="hero">
    <img src="../assets/moonlit-hero.jpg" alt="">
    <div class="protect"></div>
    <div class="cap"><div class="eb">Cool · luminous · nocturnal</div><div class="h">A field of quiet ideas</div></div>
  </div>
</body></html>
