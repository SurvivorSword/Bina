<!-- @dsCard group="Type" viewport="700x220" name="Body sans — Hanken Grotesk" subtitle="Clean humanist sans for reading & UI" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .eb{font:var(--type-mono-eyebrow);letter-spacing:.12em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:10px;}
  h4{font:var(--fw-bold) 20px var(--font-body);color:var(--text-primary);margin:0 0 6px;}
  p{font:var(--type-body);color:var(--text-secondary);max-width:560px;}
  .wts{display:flex;gap:18px;margin-top:14px;font-family:var(--font-body);color:var(--text-primary);}
  .wts span{font-size:18px;}
</style></head>
<body>
  <div class="eb">Body · Hanken Grotesk</div>
  <h4>Topics surface, peak, and fade.</h4>
  <p>Bina tracks the rise and fall of every conversation in artificial intelligence — a calm, legible record of what the field talked about, and when.</p>
  <div class="wts">
    <span style="font-weight:400">Regular</span>
    <span style="font-weight:500">Medium</span>
    <span style="font-weight:600">Semibold</span>
    <span style="font-weight:700">Bold</span>
    <span style="font-weight:800">Black</span>
  </div>
</body></html>
