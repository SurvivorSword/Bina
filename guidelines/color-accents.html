<!-- @dsCard group="Colors" viewport="700x200" name="Accents" subtitle="Glow cyan (primary), cobalt, plum, gold" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--bg);display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .group{}
  .name{font:var(--type-mono-eyebrow);letter-spacing:.12em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:8px;}
  .stack{display:flex;flex-direction:column;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-md);}
  .s{height:34px;display:flex;align-items:center;padding:0 10px;font:var(--type-mono-eyebrow);}
</style></head>
<body>
  <div class="group"><div class="name">Violet</div><div class="stack">
    <div class="s" style="background:var(--glow-300);color:#04070F">300</div>
    <div class="s" style="background:var(--glow-500);color:#04070F">500 · primary</div>
    <div class="s" style="background:var(--glow-700);color:#fff">700</div>
  </div></div>
  <div class="group"><div class="name">Sky</div><div class="stack">
    <div class="s" style="background:var(--cobalt-400);color:#04070F">400</div>
    <div class="s" style="background:var(--cobalt-500);color:#04070F">500</div>
    <div class="s" style="background:var(--cobalt-600);color:#fff">600</div>
  </div></div>
  <div class="group"><div class="name">Mint</div><div class="stack">
    <div class="s" style="background:var(--plum-300);color:#04070F">300</div>
    <div class="s" style="background:var(--plum-400);color:#04070F">400</div>
    <div class="s" style="background:var(--plum-600);color:#fff">600</div>
  </div></div>
  <div class="group"><div class="name">Gold</div><div class="stack">
    <div class="s" style="background:var(--gold-300);color:#04070F">300</div>
    <div class="s" style="background:var(--gold-400);color:#04070F">400</div>
    <div class="s" style="background:var(--gold-500);color:#04070F">500</div>
  </div></div>
</body></html>
