<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation & glow" subtitle="Light in darkness — soft shadows + bioluminescent glow" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:30px 24px;background:var(--bg);display:flex;gap:22px;align-items:center;flex-wrap:wrap;}
  .col{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .box{width:96px;height:64px;background:var(--surface-card);border-radius:var(--radius-md);border:1px solid var(--border-subtle);}
  .n{font:var(--type-mono-eyebrow);color:var(--text-muted);}
</style></head>
<body>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="n">shadow-sm</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="n">shadow-md</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="n">shadow-lg</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--glow-md);border-color:var(--border-glow)"></div><div class="n">glow-md</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--glow-plum);border-color:color-mix(in oklch,var(--plum-400) 45%,transparent)"></div><div class="n">glow-plum</div></div>
</body></html>
