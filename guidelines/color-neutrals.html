<!-- @dsCard group="Colors" viewport="700x180" name="Night neutrals" subtitle="Cool blue-tinted greys — the canvas of the system" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--bg);}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-md);}
  .sw{flex:1;height:84px;display:flex;align-items:flex-end;padding:8px;}
  .sw span{font:var(--type-mono-eyebrow);color:var(--night-100);mix-blend-mode:difference;}
  .lab{display:flex;gap:0;margin-top:10px;}
  .lab div{flex:1;font:var(--type-mono-eyebrow);color:var(--text-muted);text-align:center;letter-spacing:.05em;}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--night-950)"></div>
    <div class="sw" style="background:var(--night-900)"></div>
    <div class="sw" style="background:var(--night-800)"></div>
    <div class="sw" style="background:var(--night-700)"></div>
    <div class="sw" style="background:var(--night-600)"></div>
    <div class="sw" style="background:var(--night-500)"></div>
    <div class="sw" style="background:var(--night-400)"></div>
    <div class="sw" style="background:var(--night-300)"></div>
    <div class="sw" style="background:var(--night-200)"></div>
    <div class="sw" style="background:var(--night-100)"></div>
    <div class="sw" style="background:var(--moon)"></div>
  </div>
  <div class="lab">
    <div>950</div><div>900</div><div>800</div><div>700</div><div>600</div><div>500</div><div>400</div><div>300</div><div>200</div><div>100</div><div>moon</div>
  </div>
</body></html>
