<!-- @dsCard group="Type" viewport="700x210" name="Display serif — Cormorant Garamond" subtitle="Ethereal, high-contrast headlines & the moon-voice" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .eb{font:var(--type-mono-eyebrow);letter-spacing:.12em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:6px;}
  .big{font-family:var(--font-display);color:var(--text-display);font-weight:500;font-size:64px;line-height:1.04;letter-spacing:-.02em;margin:0;}
  .it{font-style:italic;color:var(--glow-300);}
  .meta{font:var(--type-mono-eyebrow);color:var(--text-muted);margin-top:14px;}
</style></head>
<body>
  <div class="eb">Display · Cormorant Garamond</div>
  <h1 class="big">The night remembers <span class="it">every idea</span></h1>
  <div class="meta">400 · 500 · 600 · 700 — roman & italic</div>
</body></html>
