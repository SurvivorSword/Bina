<!-- @dsCard group="Brand" viewport="700x200" name="Logo & wordmark" subtitle="Crescent mark + Cormorant wordmark; clear space" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:28px;background:var(--bg);display:flex;align-items:center;gap:40px;}
  .lockup{display:flex;align-items:center;gap:16px;}
  .lockup img{width:54px;height:54px;filter:drop-shadow(0 0 18px color-mix(in oklch,var(--glow-400) 50%,transparent));}
  .wm{font-family:var(--font-display);font-weight:500;font-size:46px;color:var(--text-display);letter-spacing:-.01em;}
  .wm b{font-weight:600;}
  .onlight{background:var(--moon);padding:16px 22px;border-radius:var(--radius-md);display:flex;align-items:center;gap:12px;}
  .onlight img{width:38px;height:38px;}
  .onlight .wm{color:var(--night-900);font-size:32px;}
</style></head>
<body>
  <div class="lockup">
    <img src="../assets/bina-mark.svg" alt="">
    <span class="wm">Bina</span>
  </div>
  <div class="onlight">
    <img src="../assets/bina-mark.svg" alt="">
    <span class="wm">Bina</span>
  </div>
</body></html>
