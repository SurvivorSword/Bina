<!-- @dsCard group="Components" viewport="700x640" name="Core primitives" subtitle="Buttons, tags, inputs, badges, avatars, tabs, sparklines" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .grid{display:flex;flex-direction:column;gap:20px;}
  .sec{display:flex;flex-direction:column;gap:10px;}
  .lbl{font:var(--type-mono-eyebrow);letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);}
  .row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Badge, Tag, Input, Switch, Avatar, Tabs, Tooltip, Sparkline, Card } = window.SeleneDesignSystem_7655ad;
const Search = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>;
const Star = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><path d="M12 3l2.7 5.8 6.3.8-4.7 4.3 1.3 6.3L12 17.8 6.1 20.5l1.3-6.3L2.7 9.6l6.3-.8z"/></svg>;
const Bell = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>;

function Demo(){
  const [tab,setTab]=React.useState('all');
  return <div className="grid">
    <div className="sec"><div className="lbl">Buttons</div><div className="row">
      <Button>Explore timeline</Button>
      <Button variant="secondary">Filter</Button>
      <Button variant="ghost">Cancel</Button>
      <Button variant="plum"><Star/>Featured</Button>
      <Button disabled>Disabled</Button>
      <Button size="sm">Small</Button>
    </div></div>

    <div className="sec"><div className="lbl">Icon buttons · Tooltip</div><div className="row">
      <IconButton label="Search"><Search/></IconButton>
      <IconButton variant="solid" label="Bookmark"><Star/></IconButton>
      <Tooltip label="Indexed weekly since 2017"><IconButton variant="solid" label="Alerts"><Bell/></IconButton></Tooltip>
    </div></div>

    <div className="sec"><div className="lbl">Badges · Tags</div><div className="row">
      <Badge tone="rise" dot>Trending</Badge>
      <Badge tone="fall" dot>Declining</Badge>
      <Badge tone="gold">Editor's pick</Badge>
      <Badge tone="info">128 papers</Badge>
      <Tag hash>diffusion models</Tag>
      <Tag hash active onClick={()=>{}}>agents</Tag>
      <Tag onRemove={()=>{}}>2023</Tag>
    </div></div>

    <div className="sec"><div className="lbl">Inputs · Switch</div><div className="row" style={{alignItems:'flex-end'}}>
      <div style={{width:240}}><Input icon={<Search/>} placeholder="Search topics…" /></div>
      <div style={{width:180}}><Input label="Alert name" placeholder="e.g. RLHF" hint="Notify on momentum spike" /></div>
      <Switch label="Live index" defaultChecked />
    </div></div>

    <div className="sec"><div className="lbl">Avatars · Tabs</div><div className="row">
      <Avatar name="Ada Lovelace" />
      <Avatar name="Geoffrey Hinton" ring />
      <Avatar name="Yann LeCun" size="lg" />
      <Tabs value={tab} onChange={setTab} items={[{value:'all',label:'All time'},{value:'yr',label:'This year'},{value:'wk',label:'This week'}]} />
    </div></div>

    <div className="sec"><div className="lbl">Sparklines</div><div className="row">
      <Sparkline data={[3,5,4,8,12,9,18,24,30]} tone="rise" width={150} height={42} />
      <Sparkline data={[28,24,25,18,16,11,9,6]} tone="fall" width={150} height={42} />
      <Sparkline data={[8,9,7,12,10,14,13,17]} tone="plum" width={150} height={42} />
    </div></div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
